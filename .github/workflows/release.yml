name: Release

on:
  workflow_dispatch:
    inputs:
      version_increment:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Get the latest version
        id: get_version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT
          echo "Latest tag found: $latest_tag"

      - name: Calculate new version
        id: new_version
        run: |
          latest_tag="${{ steps.get_version.outputs.latest_tag }}"
          version=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$version"
          
          if [[ "${{ github.event.inputs.version_increment }}" == "major" ]]; then
            new_major=$((major + 1))
            new_version="${new_major}.0.0"
          elif [[ "${{ github.event.inputs.version_increment }}" == "minor" ]]; then
            new_minor=$((minor + 1))
            new_version="${major}.${new_minor}.0"
          else
            new_patch=$((patch + 1))
            new_version="${major}.${minor}.${new_patch}"
          fi
          
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "New version calculated: $new_version"

      - name: Update application.properties
        run: |
          new_version="${{ steps.new_version.outputs.new_version }}"
          sed -i "s/quarkus.application.version=.*/quarkus.application.version=${new_version}/" src/main/resources/application.properties

      - name: Commit version change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/application.properties
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.new_version }}"

      - name: Push commit and create tag
        run: |
          git push origin HEAD:main
          git tag -a "v${{ steps.new_version.outputs.new_version }}" -m "Release v${{ steps.new_version.outputs.new_version }}"
          git push origin "v${{ steps.new_version.outputs.new_version }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Quarkus native image (ou JVM)
        run: |
          # Altere para 'native' se quiser imagem nativa, mas requer setup de GraalVM
          ./gradlew build -Dquarkus.container-image.build=true

      - name: Tag and push image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          NEW_VERSION=${{ steps.new_version.outputs.new_version }}
          
          # A imagem já foi gerada pelo Quarkus com a tag definida no properties (nova versão)
          # Vamos renomear/tagear com a versão e também latest
          docker tag $IMAGE_NAME:$NEW_VERSION $IMAGE_NAME:latest
          
          docker push $IMAGE_NAME:$NEW_VERSION
          docker push $IMAGE_NAME:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new_version.outputs.new_version }}
          name: Release v${{ steps.new_version.outputs.new_version }}
          body: |
            ## 🚀 Release v${{ steps.new_version.outputs.new_version }}
            
            ### 🔧 Version Increment: ${{ github.event.inputs.version_increment }}
            
            ### 🐳 Container Image
            Publicada no GHCR: `ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.new_version.outputs.new_version }}`
            
            Este release foi gerado automaticamente pelo GitHub Actions.
          draft: false
          prerelease: false
          generate_release_notes: true