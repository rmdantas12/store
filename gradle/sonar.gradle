sonarqube {
    properties {
        property 'sonar.projectName', 'store'

        // Receber do CI (GitHub Actions secrets/vars)
        if (System.getenv('SONAR_PROJECT_KEY') != null) {
            property 'sonar.projectKey', System.getenv('SONAR_PROJECT_KEY')
        }
        if (System.getenv('SONAR_ORGANIZATION') != null) {
            property 'sonar.organization', System.getenv('SONAR_ORGANIZATION')
        }
        if (System.getenv('SONAR_HOST_URL') != null) {
            property 'sonar.host.url', System.getenv('SONAR_HOST_URL')
        }

        // Cobertura JaCoCo (XML)
        property 'sonar.coverage.jacoco.xmlReportPaths', "${layout.buildDirectory.get()}/reports/jacoco/test/jacocoTestReport.xml"

        // Excluir do cálculo de cobertura o que não faz sentido testar diretamente
        property 'sonar.coverage.exclusions', [
            '**/infrastructure/web/**',
            '**/infrastructure/persistence/**',
            '**/domain/model/**',
            '**/infrastructure/**/mapper/**'
        ].join(',')
    }
}

