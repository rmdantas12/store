sonarqube {
    properties {
        property 'sonar.projectName', 'store'

        def projectKey = System.getenv('SONAR_PROJECT_KEY')
        if (projectKey != null && !projectKey.isBlank()) {
            property 'sonar.projectKey', projectKey
        }

        def organization = System.getenv('SONAR_ORGANIZATION')
        if (organization != null && !organization.isBlank()) {
            property 'sonar.organization', organization
        }

        def hostUrl = System.getenv('SONAR_HOST_URL')
        if (hostUrl != null && !hostUrl.isBlank()) {
            if (!hostUrl.startsWith('http://') && !hostUrl.startsWith('https://')) {
                hostUrl = 'https://' + hostUrl
            }
            property 'sonar.host.url', hostUrl
        }

        property 'sonar.coverage.jacoco.xmlReportPaths', "${layout.buildDirectory.get()}/reports/jacoco/test/jacocoTestReport.xml"

        property 'sonar.coverage.exclusions', [
            '**/infrastructure/web/**',
            '**/infrastructure/persistence/**',
            '**/domain/model/**',
            '**/infrastructure/**/mapper/**'
        ].join(',')
    }
}

