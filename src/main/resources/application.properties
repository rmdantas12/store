# Application
quarkus.application.version=0.0.3

# Container
quarkus.container-image.build=true
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=rmdantas12
quarkus.container-image.name=store
quarkus.container-image.tag=${quarkus.application.version}

# Datasource PostgreSQL with H2
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/store
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true