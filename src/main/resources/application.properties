# Application
quarkus.application.version=1.0.0

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Store API
quarkus.smallrye-openapi.info-version=${quarkus.application.version}
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=bearerAuth

# Container
quarkus.container-image.build=false
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=rmdantas12
quarkus.container-image.name=store
quarkus.container-image.tag=${quarkus.application.version}

# Datasource PostgreSQL with H2
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/store
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Security (Keycloak / OIDC)
quarkus.oidc.auth-server-url=http://localhost:8081/realms/store
quarkus.oidc.client-id=store-api
quarkus.oidc.credentials.secret=store-secret
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=realm_access/roles
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated
quarkus.http.auth.permission.public.paths=/q/*
quarkus.http.auth.permission.public.policy=permit