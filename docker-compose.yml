services:
  postgres:
    image: postgres:16-alpine
    container_name: customer_postgres
    environment:
      POSTGRES_DB: store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - customer_network

volumes:
  postgres_data:

networks:
  customer_network:
    driver: bridge