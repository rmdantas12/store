services:
  postgres:
    image: postgres:16-alpine
    container_name: customer_postgres
    environment:
      POSTGRES_DB: store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - customer_network

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.0
    container_name: store_keycloak
    command: [ "start-dev", "--import-realm" ]
    environment:
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-store.json:/opt/keycloak/data/import/realm-store.json:ro
    networks:
      - customer_network

volumes:
  postgres_data:

networks:
  customer_network:
    driver: bridge